services:
  - type: web
    name: bradatec-sego
    env: node
    region: oregon
    plan: free
    buildCommand: |
      npm install
      npm install -g puppeteer
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /opt/render/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome

# Configuración para Railway con soporte Puppeteer
[phases.setup]
nixPkgs = ['nodejs_20', 'chromium']

[phases.install]
cmds = ['npm install']

[start]
cmd = 'node server.js'

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'
PUPPETEER_EXECUTABLE_PATH = '$(which chromium)'
NODE_ENV = 'production'
